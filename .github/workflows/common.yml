# vim: et

on:
  workflow_call:

jobs:
  tests:
    name: Run Tox & PyTest
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python:
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548
        with:
          python-version: ${{ matrix.python }}
          pip-install: --upgrade pip

      - name: Get pip cache dir
        id: pip-cache-dir
        run: |
          echo "dir=$(pip cache dir)" >> $GITHUB_OUTPUT

      - name: Cache Pip environment
        uses: actions/cache@9255dc7a253b0ccc959486e2bca901246202afeb
        with:
          key: pip-${{ matrix.python }}-${{ hashFiles('pyproject.toml', 'setup.cfg') }}
          path: ${{ steps.pip-cache-dir.outputs.dir }}

      - name: Cache Tox environment
        uses: actions/cache@9255dc7a253b0ccc959486e2bca901246202afeb
        with:
          key: tox-${{ matrix.python }}-${{ hashFiles('pyproject.toml', 'setup.cfg') }}
          path: .tox

      - name: Install prerequistes for testing
        run: |
          python -m pip install tox tox-gh

      - name: Prepare Tox
        run: |
          tox --conf pyproject.toml run -v --notest --skip-missing-interpreters false
        env:
          TOX_GH_MAJOR_MINOR: ${{ matrix.python }}

      - name: Run Tox
        run: |
          tox --conf pyproject.toml run --skip-pkg-install
        env:
          TOX_GH_MAJOR_MINOR: ${{ matrix.python }}

      - name: Rename coverage file
        run: |
          mv .coverage .coverage.${{ matrix.python }}

      - name: Upload coverage file
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4
        with:
          name: coverage-${{ matrix.python }}
          path: .coverage.*
          include-hidden-files: true
          retention-days: 1

  coverage-report:
    name: Report Coverage
    runs-on: ubuntu-latest
    needs:
      - tests

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8

      - name: Set up Python 3.11
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548
        with:
          python-version: 3.11

      - name: Install coverage
        run: |
          pip install -U pip
          pip install coverage

      - name: Download coverage files
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53
        with:
          pattern: coverage-*
          merge-multiple: true

      - name: Combine coverage files
        run: |
          coverage combine

      - name: Report coverage
        run: |
          coverage report

  linting:
    name: Run MyPy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8

      - name: Set up Python
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548
        with:
          python-version: 3.11

      - name: Prepare pip
        run: |
          python -m pip install --upgrade pip

      - name: Install prerequistes for testing
        run: |
          python -m pip install .[test]

      - name: Run MyPy
        run: |
          mypy --exclude build .
