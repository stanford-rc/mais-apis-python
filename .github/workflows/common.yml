# vim: et

on:
  workflow_call:

jobs:
  tests:
    name: Run Tox & PyTest
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python:
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Cache Tox environment
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          key: tox-${{ matrix.python }}-${{ hashFiles('pyproject.toml', 'setup.cfg') }}
          path: .tox

      - name: Install prerequistes for testing
        run: |
          python -m pip install --upgrade pip
          python -m pip install tox tox-gh

      - name: Prepare Tox
        run: |
          tox --conf pyproject.toml run -v --notest --skip-missing-interpreters false
        env:
          TOX_GH_MAJOR_MINOR: ${{ matrix.python }}

      - name: Run Tox
        run: |
          tox --conf pyproject.toml run --skip-pkg-install
        env:
          TOX_GH_MAJOR_MINOR: ${{ matrix.python }}

      - name: Rename coverage file
        run: |
          mv .coverage .coverage.${{ matrix.python }}

      - name: Upload coverage file
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: coverage-${{ matrix.python }}
          path: .coverage.*
          include-hidden-files: true
          retention-days: 1

  coverage-report:
    name: Report Coverage
    runs-on: ubuntu-latest
    needs:
      - tests

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Python 3.11
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: 3.11

      - name: Install coverage
        run: |
          pip install -U pip
          pip install coverage

      - name: Download coverage files
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          pattern: coverage-*
          merge-multiple: true

      - name: Combine coverage files
        run: |
          coverage combine

      - name: Report coverage
        run: |
          coverage report

  linting:
    name: Run MyPy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: 3.11

      - name: Prepare pip
        run: |
          python -m pip install --upgrade pip

      - name: Install prerequistes for testing
        run: |
          python -m pip install .[test]

      - name: Run MyPy
        run: |
          mypy --exclude build .
